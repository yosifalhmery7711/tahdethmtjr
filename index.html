<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>مَتْجَرُ أُمِّ رُوْح 🌸</title>
    <!-- PWA Support Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d97706" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="متجر أم روح" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Capture the beforeinstallprompt event as early as possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // Dispatch custom event so React can pick it up immediately
        window.dispatchEvent(new CustomEvent('global-beforeinstallprompt', { detail: e }));
        console.log('⚡ Early PWA beforeinstallprompt event captured and stored globally!');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
